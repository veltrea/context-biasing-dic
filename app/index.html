<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="/src/styles.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>biasdiff</title>
    <script type="module" src="/src/main.ts" defer></script>
  </head>

  <body>
    <div class="app">
      <!-- Top bar -->
      <header class="topbar">
        <div class="topbar-left">
          <span class="brand">biasdiff</span>
          <span class="vsep"></span>
          <div class="counter">
            <span class="counter-label" data-i18n="dangerWords">危険語</span>
            <span class="counter-value" id="danger-count">0</span>
            <svg class="spark" viewBox="0 0 32 16" width="28" height="14" fill="none" aria-hidden="true">
              <path d="M0 12L6 8L12 14L22 4L32 6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" />
              <circle cx="22" cy="4" r="2" fill="currentColor" />
            </svg>
          </div>
        </div>
        <div class="topbar-right">
          <span class="dict-badge" id="dict-badge">IPADIC</span>
          <label class="switch">
            <input type="checkbox" id="strict-toggle" />
            <span class="switch-track"><span class="switch-thumb"></span></span>
            <span class="switch-label" data-i18n="strict">厳密一致</span>
          </label>
        </div>
      </header>

      <!-- Workspace -->
      <main class="workspace">
        <!-- Left: the collect loop -->
        <section class="loop">
          <div class="loop-head">
            <svg class="icon" viewBox="0 0 24 24" width="18" height="18" fill="currentColor" aria-hidden="true">
              <path d="M12 6V3L8 7l4 4V8c2.76 0 5 2.24 5 5 0 .85-.21 1.65-.59 2.36l1.46 1.46A6.96 6.96 0 0019 13c0-3.87-3.13-7-7-7zm0 12c-2.76 0-5-2.24-5-5 0-.85.21-1.65.59-2.36L6.13 9.18A6.96 6.96 0 005 13c0 3.87 3.13 7 7 7v3l4-4-4-4v3z" />
            </svg>
            <h2 data-i18n="collectTitle">収集 (Collect)</h2>
          </div>

          <div class="card">
            <label class="card-label" for="reference">
              <span class="dot dot-ref"></span>
              <span data-i18n="referenceLabel">正解文 (Reference)</span>
            </label>
            <textarea id="reference" spellcheck="false"></textarea>
          </div>

          <div class="card">
            <label class="card-label" for="hypothesis">
              <span class="dot dot-hyp"></span>
              <span data-i18n="hypothesisLabel">認識結果 (ASR)</span>
            </label>
            <textarea id="hypothesis" spellcheck="false"></textarea>
          </div>

          <div class="actions">
            <span class="summary" id="summary"></span>
            <button id="clear-btn" class="ghost" data-i18n="clear">クリア</button>
            <button id="diff-btn" class="primary">
              <span data-i18n="diff">照合</span>
              <kbd>⌘↵</kbd>
            </button>
          </div>

          <div class="difftable">
            <div class="difftable-head">
              <span data-i18n="diffResult">差分検出結果</span>
              <span class="items" id="items-count">0 items</span>
            </div>
            <ul class="rows" id="rows"></ul>
          </div>
        </section>

        <!-- Right: accumulation -->
        <aside class="accumulation">
          <div class="acc-head">
            <h3 data-i18n="accTitle">溜まっている危険語</h3>
            <div class="acc-actions">
              <button id="export-dict-btn" class="ghost" data-i18n="exportDict">辞書</button>
              <button id="export-reject-btn" class="ghost" data-i18n="exportReject">除外ログ</button>
            </div>
          </div>
          <ul class="chips" id="chips"></ul>
        </aside>
      </main>

      <!-- Footer -->
      <footer class="footer">
        <span class="footer-left">
          <svg class="icon" viewBox="0 0 24 24" width="13" height="13" fill="currentColor" aria-hidden="true">
            <path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zM9 6c0-1.66 1.34-3 3-3s3 1.34 3 3v2H9V6z" />
          </svg>
          <span data-i18n="footerPrivacy">ローカル完結・外部送信なし ／ 外に出るのは語だけ</span>
        </span>
        <span class="footer-right" data-i18n="footerTag">biasdiff: Linguistic Integrity Guaranteed</span>
      </footer>
    </div>
  </body>
</html>
